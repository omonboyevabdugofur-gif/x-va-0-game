<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>X va 0 - Kuchli Bot</title>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #111827;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.15);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --x: #38bdf8;
      --o: #f472b6;
      --win: #22c55e;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #1e293b 0%, transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 16px;
    }

    .game {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 24px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 18px;
    }

    .status {
      text-align: center;
      margin-bottom: 18px;
      font-size: 1.05rem;
      font-weight: 600;
      min-height: 28px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .cell {
      aspect-ratio: 1;
      border: none;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 2.8rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      touch-action: manipulation;
    }

    .cell:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.13);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .cell:active {
      transform: scale(0.96);
    }

    .cell:disabled {
      cursor: not-allowed;
      transform: none;
    }

    .x {
      color: var(--x);
      text-shadow: 0 0 18px rgba(56, 189, 248, 0.45);
    }

    .o {
      color: var(--o);
      text-shadow: 0 0 18px rgba(244, 114, 182, 0.45);
    }

    .win {
      background: rgba(34, 197, 94, 0.18) !important;
      box-shadow: inset 0 0 0 2px rgba(34, 197, 94, 0.75);
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      color: white;
      transition: transform 0.15s ease, opacity 0.2s ease;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .restart {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .newgame {
      background: linear-gradient(135deg, #0f766e, #06b6d4);
    }

    .footer {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .game {
        max-width: 100%;
        width: 100%;
        padding: 16px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 14px;
      }

      .status {
        font-size: 0.95rem;
        margin-bottom: 14px;
      }

      .board {
        gap: 10px;
        margin-bottom: 16px;
      }

      .cell {
        font-size: 2.3rem;
        border-radius: 14px;
      }

      .controls {
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        width: 100%;
        padding: 13px 14px;
        font-size: 0.95rem;
        border-radius: 12px;
      }

      .footer {
        font-size: 0.8rem;
        margin-top: 12px;
      }
    }

    @media (max-width: 380px) {
      .cell {
        font-size: 2rem;
      }

      h1 {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>X va 0</h1>
    <div class="subtitle">Sen — X. Bot — 0. Bot yutqazmaydi.</div>

    <div id="status" class="status">Sening navbing.</div>

    <div class="board" id="board">
      <button class="cell" data-index="0"></button>
      <button class="cell" data-index="1"></button>
      <button class="cell" data-index="2"></button>
      <button class="cell" data-index="3"></button>
      <button class="cell" data-index="4"></button>
      <button class="cell" data-index="5"></button>
      <button class="cell" data-index="6"></button>
      <button class="cell" data-index="7"></button>
      <button class="cell" data-index="8"></button>
    </div>

    <div class="controls">
      <button class="btn restart" onclick="resetGame()">Qayta boshlash</button>
      <button class="btn newgame" onclick="resetGame(true)">Yangi o'yin</button>
    </div>

    <div class="footer">Eng kuchli bot: minimax algoritmi</div>
  </div>

  <script>
    const human = "X";
    const bot = "O";
    let board = ["", "", "", "", "", "", "", "", ""];
    let gameOver = false;
    let humanTurn = true;

    const cells = document.querySelectorAll(".cell");
    const statusEl = document.getElementById("status");

    const winPatterns = [
      [0, 1, 2],
      [3, 4, 5],
      [6, 7, 8],
      [0, 3, 6],
      [1, 4, 7],
      [2, 5, 8],
      [0, 4, 8],
      [2, 4, 6]
    ];

    cells.forEach(cell => {
      cell.addEventListener("click", () => handleMove(+cell.dataset.index));
    });

    function handleMove(index) {
      if (gameOver || !humanTurn || board[index]) return;

      board[index] = human;
      render();

      if (checkGameState()) return;

      humanTurn = false;
      statusEl.textContent = "Bot o'ylayapti...";
      setTimeout(botMove, 250);
    }

    function botMove() {
      let bestScore = -Infinity;
      let move = -1;

      for (let i = 0; i < 9; i++) {
        if (board[i] === "") {
          board[i] = bot;
          const score = minimax(board, 0, false);
          board[i] = "";
          if (score > bestScore) {
            bestScore = score;
            move = i;
          }
        }
      }

      if (move !== -1) {
        board[move] = bot;
      }

      render();

      if (checkGameState()) return;

      humanTurn = true;
      statusEl.textContent = "Sening navbing.";
    }

    function minimax(boardState, depth, isMaximizing) {
      const winner = getWinner(boardState);

      if (winner === bot) return 10 - depth;
      if (winner === human) return depth - 10;
      if (!boardState.includes("")) return 0;

      if (isMaximizing) {
        let best = -Infinity;
        for (let i = 0; i < 9; i++) {
          if (boardState[i] === "") {
            boardState[i] = bot;
            best = Math.max(best, minimax(boardState, depth + 1, false));
            boardState[i] = "";
          }
        }
        return best;
      } else {
        let best = Infinity;
        for (let i = 0; i < 9; i++) {
          if (boardState[i] === "") {
            boardState[i] = human;
            best = Math.min(best, minimax(boardState, depth + 1, true));
            boardState[i] = "";
          }
        }
        return best;
      }
    }

    function getWinner(b) {
      for (const [a, c, d] of winPatterns) {
        if (b[a] && b[a] === b[c] && b[a] === b[d]) {
          return b[a];
        }
      }
      return null;
    }

    function checkGameState() {
      const winner = getWinner(board);

      if (winner) {
        gameOver = true;
        statusEl.textContent = winner === human ? "Tabriklayman, sen yutding!" : "Bot yutdi.";
        highlightWin(winner);
        disableBoard();
        return true;
      }

      if (board.every(cell => cell !== "")) {
        gameOver = true;
        statusEl.textContent = "Durrang!";
        disableBoard();
        return true;
      }

      return false;
    }

    function highlightWin(winner) {
      for (const [a, b, c] of winPatterns) {
        if (board[a] === winner && board[a] === board[b] && board[a] === board[c]) {
          cells[a].classList.add("win");
          cells[b].classList.add("win");
          cells[c].classList.add("win");
          break;
        }
      }
    }

    function render() {
      cells.forEach((cell, i) => {
        cell.textContent = board[i];
        cell.classList.remove("x", "o");
        if (board[i] === human) cell.classList.add("x");
        if (board[i] === bot) cell.classList.add("o");
      });
    }

    function disableBoard() {
      cells.forEach(cell => cell.disabled = true);
    }

    function resetGame(newStart = false) {
      board = ["", "", "", "", "", "", "", "", ""];
      gameOver = false;
      humanTurn = true;
      statusEl.textContent = newStart ? "Yangi o'yin boshlandi. Sening navbing." : "Sening navbing.";

      cells.forEach(cell => {
        cell.classList.remove("x", "o", "win");
        cell.disabled = false;
        cell.textContent = "";
      });
    }

    render();
  </script>
</body>
</html>
